name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: rsync to mosharafmanu.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Pin server fingerprints (scanned 2026-06-13 — do not replace with keyscan)
          cat >> ~/.ssh/known_hosts << 'EOF'
          [72.62.68.183]:65002 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINQQedliBFBvh2wnMrS5FIEXRc97rSqyBTsmUrAhWTiJ
          [72.62.68.183]:65002 ssh-rsa 
          [72.62.68.183]:65002 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEOrEol1bjJw12rKzqp9skjnbGlZzTtgrODbL9Ve1p2lH5VBlN3pVmXT2Vn2z5JR6gFhp6catMwTd3613HnDAbw=
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -azv --delete \
            --exclude-from='.deploy-exclude' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_DEPLOY_PATH }}/

      - name: Flush WordPress object cache
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "wp --path=/home/${{ secrets.SSH_USER }}/domains/mosharafmanu.com/public_html cache flush 2>/dev/null || true"
