name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger deploy on mosharafmanu.com
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server-side git pull
        run: |
          # NOTE: a custom User-Agent is required — the host WAF blocks the
          # default curl/* UA from datacenter (GitHub runner) IPs with a 403.
          HTTP=$(curl -s -o resp.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -A "wpcc-deploy-bot" \
            --max-time 60 \
            "https://mosharafmanu.com/wpcc-deploy.php")
          echo "HTTP_CODE=$HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Deploy webhook returned $HTTP:"; head -c 2048 resp.txt; echo
            exit 1
          fi
          python3 -c "
          import sys, json
          data = json.load(open('resp.txt'))
          print('--- git pull ---'); print(data.get('pull',''))
          print('--- cache flush ---'); print(data.get('cache',''))
          if data.get('error'):
              print('ERROR:', data['error']); sys.exit(1)
          "
