name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger deploy on mosharafmanu.com
    runs-on: ubuntu-latest

    steps:
      - name: Debug DEPLOY_TOKEN (length + hash only, no secret leak)
        run: |
          TOK="${{ secrets.DEPLOY_TOKEN }}"
          echo "DEPLOY_TOKEN length: ${#TOK}"
          GOT=$(printf %s "$TOK" | sha256sum | cut -d' ' -f1)
          EXP="0f0ac4d4b2acf8d58d63a88843fa363c999201f4cf41ef6197ff6312f6425100"
          if [ "$GOT" = "$EXP" ]; then echo "TOKEN MATCH: yes"; else echo "TOKEN MATCH: no"; fi

      - name: Trigger server-side git pull
        run: |
          response=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "https://mosharafmanu.com/wpcc-deploy.php")
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('--- git pull ---')
          print(data.get('pull',''))
          print('--- cache flush ---')
          print(data.get('cache',''))
          if data.get('error'):
              print('ERROR:', data['error'])
              sys.exit(1)
          "
