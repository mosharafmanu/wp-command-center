name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger deploy on mosharafmanu.com
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server-side git pull
        run: |
          response=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "https://mosharafmanu.com/wpcc-deploy.php")
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('--- git pull ---')
          print(data.get('pull',''))
          print('--- cache flush ---')
          print(data.get('cache',''))
          if data.get('error'):
              print('ERROR:', data['error'])
              sys.exit(1)
          "
