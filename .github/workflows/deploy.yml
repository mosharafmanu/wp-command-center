name: Deploy to Production

# DEPLOY MODEL CHANGED (2026-06-15): PULL-BASED, server-side cron.
#
# The host (Hostinger) blocks inbound SSH from GitHub-hosted runner IPs
# ("ssh: connect to host ... port 65002: Connection timed out"), so the old
# push-based SSH deploy can no longer reach the server. Deploys now run FROM the
# server (outbound to GitHub is not blocked):
#
#   server: ~/wpcc-deploy.sh  — git fetch + reset --hard origin/main
#           + reactivate-if-active + wp cache flush (idempotent, flock-guarded)
#   schedule: hPanel → Advanced → Cron Jobs, every 1–2 min:
#           /bin/bash /home/u916998506/wpcc-deploy.sh >/dev/null 2>&1
#
# Manual one-off (from an allowed IP): see MANUAL DEPLOY FALLBACK in the handoff.
# This workflow is kept GREEN as a no-op so pushes don't generate red runs.

on:
  push:
    branches:
      - main

jobs:
  notice:
    name: Deploy notice (pull-based — no action)
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "Production deploys are PULL-BASED (server-side cron runs ~/wpcc-deploy.sh)."
          echo "GitHub-hosted runners cannot reach the host (inbound SSH blocked), so this"
          echo "workflow intentionally does nothing. The server pulls origin/main on its cron."
          echo "::notice::Pushed to main — the server will pull this commit on its next cron tick."
